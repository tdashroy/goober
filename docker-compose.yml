name: goober

# `docker compose up` brings up the headless default stack (just the server). The
# Android emulator is opt-in behind the `emulator` profile — it draws a native
# window on the host desktop, so it is never part of the display-less default.
# Start it with `make emulator` (or `docker compose --profile emulator up`).
# Build the shared base image first (`make base`, or the
# `docker build -f docker/base.Dockerfile ...` it wraps) — the build/test and
# emulator images derive from it.

services:
  # Rust axum + SQLite backend.
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
      args:
        # This is the dev stack, so build the server with its dev testing harness
        # compiled in: the seed profiles and the route that signs a client in as a
        # seeded person. Both are absent from a default build of the image — clear
        # the variable (`SERVER_FEATURES= make up`) to get a production-shaped
        # server that cannot seed, which is what a deploy would build.
        SERVER_FEATURES: ${SERVER_FEATURES-dev-seed}
    image: goober-server:latest
    ports:
      - "8080:8080"
    environment:
      # Name a seed profile (`SEED_PROFILE=beach-trip`, or `make scenario
      # SEED=beach-trip`) and the server boots with that ready-made world already
      # in the database — a group, its members, its places. Unset, the server
      # starts empty exactly as before. Seeding is idempotent, so this can stay set
      # across restarts of a persistent database without piling up duplicates.
      SEED_PROFILE: ${SEED_PROFILE:-}
    volumes:
      - server-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # Builds the debug APK into a shared volume, then exits; the emulator installs
  # from it. Pointed at 10.0.2.2:8080 — the guest's alias for the emulator
  # container, which forwards to the server (see docker/emulator-entrypoint.sh).
  apk-builder:
    build:
      context: .
      dockerfile: docker/build-test.Dockerfile
    image: goober-build-test:latest
    profiles: ["emulator"]
    environment:
      # Named seeded people (`bob,grandma`, set by `make scenario USERS=...`) get
      # one APK each, compiled to boot signed in as them. Empty — the default —
      # builds the single ordinary APK with the normal login flow.
      CLIENT_PROFILES: ${CLIENT_PROFILES:-}
    volumes:
      - .:/workspace
      - apk:/apk
      # Persist the expensive, reusable build caches across container teardown
      # (`make down`) and fresh machines. Without these, the first `flutter build
      # apk` in a new container reinstalls the Android NDK/CMake (~2-3 min) and
      # re-fetches every Gradle/pub dependency; with them a fresh container reuses
      # the volumes and does the ~20s incremental build. Mounted at the specific
      # cache subdirs so they never shadow the SDK pieces baked into the base image.
      - android-ndk:/opt/android-sdk/ndk
      - android-cmake:/opt/android-sdk/cmake
      - gradle-cache:/home/dev/.gradle
      - pub-cache:/opt/pub-cache
    # Clears any prior APK first so the emulator (which waits for the file to
    # appear, not for this container to exit) never installs a stale build, and
    # publishes each fresh one via an atomic rename so it is only ever seen whole.
    command: ["bash", "-lc", "/workspace/docker/build-apks.sh"]

  # Long-running, hardware-accelerated Android emulator that renders its own GUI
  # as a native window on the host desktop via the host X server. Opt-in only —
  # it lives behind the `emulator` profile, so the default `docker compose up`
  # (and any display-less machine) never starts it. Launch with `make emulator`.
  #
  # This is instance one. `make scenario` runs several people side by side by
  # generating sibling services (emulator-2, ...) from this one — see
  # docker/gen-scenario.sh — each with its own window, each installing the APK
  # built for its person. Nothing is shared between them: the AVD lives in the
  # image layer, so every container boots its own private writable copy and no
  # instance can lock or corrupt another's.
  emulator:
    build:
      context: .
      dockerfile: docker/emulator.Dockerfile
    image: goober-emulator:latest
    profiles: ["emulator"]
    privileged: true
    devices:
      - "/dev/kvm:/dev/kvm"   # CPU acceleration (KVM)
      - "/dev/dri:/dev/dri"   # host GPU for hardware GL (-gpu host)
    environment:
      SERVER_HOST: server
      SERVER_PORT: "8080"
      APK_PATH: /apk/app-debug.apk
      APP_ID: com.tdashroy.goober
      # Draw the emulator window on the host desktop. The host must first allow
      # the container to connect to its X server: `xhost +local:` (see
      # docs/dev-container.md). EMULATOR_GPU falls back to swiftshader_indirect
      # if hardware GL misbehaves.
      DISPLAY: ${DISPLAY:-:0}
      EMULATOR_GPU: ${EMULATOR_GPU:-host}
    volumes:
      - apk:/apk
      - /tmp/.X11-unix:/tmp/.X11-unix   # host X server socket (native window)
    # Gate only on the server being healthy. The emulator does NOT depend on
    # apk-builder's exit state: it waits for the built APK to appear in the
    # shared `apk` volume (see docker/emulator-entrypoint.sh) and installs that.
    # A stale or failed prior build container therefore can never wedge a launch
    # — Compose has no "must have completed successfully" edge that a leftover
    # exited container could make permanently unsatisfiable.
    depends_on:
      server:
        condition: service_healthy

  # Interactive Flutter hot-reload loop, layered on top of a running emulator
  # (`make emulator`). Runs `flutter run` in the build/test image — but JOINS THE
  # EMULATOR CONTAINER'S NETWORK NAMESPACE (`network_mode: service:emulator`)
  # instead of the shared Compose network. That is the whole trick: the emulator's
  # adb server (127.0.0.1:5037), the adb port-forwards `flutter run` creates, and
  # the Dart VM service it then connects to all live on one shared loopback, so
  # `flutter run -d emulator-5554` reaches the device and hot reload attaches with
  # no cross-container adb/port plumbing. Opt-in via the `dev` profile so it never
  # starts with the default stack; run it interactively (the `emulator` profile is
  # also enabled so this service's network_mode target is defined, and `--no-deps`
  # attaches to the running emulator without restarting the stack):
  #   docker compose --profile emulator --profile dev run --rm --no-deps dev
  #   (== make dev)
  # File-save events do NOT cross the host→container bind mount on Linux, and the
  # `flutter run` CLI has no watch/poll mode anyway, so the loop is manual: press
  # `r` to hot-reload, `R` to hot-restart, `q` to quit. The app reaches the server
  # exactly as in the normal flow (GOOBER_API_BASE -> 10.0.2.2:8080 -> socat).
  dev:
    image: goober-build-test:latest
    profiles: ["dev"]
    network_mode: "service:emulator"
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      # Same persisted caches as apk-builder/test (shared image) so the first
      # `flutter run` reuses the Gradle/pub caches and does a fast incremental build.
      - android-ndk:/opt/android-sdk/ndk
      - android-cmake:/opt/android-sdk/cmake
      - gradle-cache:/home/dev/.gradle
      - pub-cache:/opt/pub-cache
    command: >
      bash -lc "cd /workspace/app &&
                flutter pub get &&
                adb wait-for-device &&
                exec flutter run -d emulator-5554
                     --dart-define=GOOBER_API_BASE=http://10.0.2.2:8080
                     ${FLUTTER_RUN_ARGS:-}"

  # CI-parity check: static analysis + headless tests, no host toolchain.
  # Run on demand:  docker compose run --rm test
  test:
    build:
      context: .
      dockerfile: docker/build-test.Dockerfile
    image: goober-build-test:latest
    profiles: ["test"]
    volumes:
      - .:/workspace
      # Same persisted caches as apk-builder (shared image) so tests reuse the
      # Gradle/pub caches too and stay fast across fresh containers.
      - android-ndk:/opt/android-sdk/ndk
      - android-cmake:/opt/android-sdk/cmake
      - gradle-cache:/home/dev/.gradle
      - pub-cache:/opt/pub-cache
    command: >
      bash -lc "cd /workspace/app &&
                flutter pub get &&
                flutter analyze &&
                flutter test"

volumes:
  server-data:
  apk:
  # Persisted build caches (see apk-builder). Survive `make down`; cleared by
  # `make clean` (down -v) like the others.
  android-ndk:
  android-cmake:
  gradle-cache:
  pub-cache:
